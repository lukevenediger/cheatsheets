<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cheatsheets</title>
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --border: rgba(0, 0, 0, 0.12);
    --border-strong: rgba(0, 0, 0, 0.2);
    --text: #1a1a1a;
    --text-muted: #666;
    --text-faint: #888;
    --accent: #c96442;
    --kbd-bg: #f3f1e9;
    --kbd-border: rgba(0, 0, 0, 0.15);
    --code: #3c3a34;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text: #f0ece3;
      --text-muted: #a8a59b;
      --text-faint: #7a776e;
      --accent: #d97757;
      --kbd-bg: #2f2f2f;
      --kbd-border: rgba(255, 255, 255, 0.18);
      --code: #d0ccc0;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 4rem 1.5rem 4rem;
  }

  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  h1 {
    font-size: 28px;
    font-weight: 500;
    margin: 0 0 0.25rem;
    letter-spacing: -0.01em;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0;
  }

  h2 {
    font-size: 14px;
    font-weight: 500;
    margin: 2rem 0 1rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  ul.sheets {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 0.5rem;
  }

  ul.sheets a {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s ease;
  }

  ul.sheets a:hover {
    border-color: var(--border-strong);
  }

  ul.sheets .name {
    font-weight: 500;
  }

  ul.sheets .desc {
    color: var(--text-muted);
    font-size: 13.5px;
    text-align: right;
  }

  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text-faint);
  }

  footer a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 0.5px solid var(--border);
  }

  footer a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>cheatsheets</h1>
  <p class="subtitle">Personal cheatsheets cooked up from real work.</p>
</header>

<h2>Sheets</h2>
<ul class="sheets">
  <li>
    <a href="tmux.html">
      <span class="name">tmux</span>
      <span class="desc">Keybindings &amp; commands for the terminal multiplexer</span>
    </a>
  </li>
</ul>

<footer>
  <a href="https://github.com/lukevenediger/cheatsheets">github.com/lukevenediger/cheatsheets</a>
</footer>

</div>
</body>
</html>
